<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <div class="card dashboard-card">
      <div class="dashboard-header">
        <div>
          <h1>Welcome to the Dashboard</h1>
          <p class="subtitle">You are logged in.</p>
        </div>
        <button id="logoutBtn" class="secondary-btn" type="button">Logout</button>
      </div>

      <section class="dashboard-grid">
        <div class="info-panel">
          <h2>User Info</h2>
          <p><strong>Username:</strong> <span id="displayUsername">-</span></p>
          <p><strong>First Name:</strong> <span id="displayFirstName">-</span></p>
          <p><strong>Last Name:</strong> <span id="displayLastName">-</span></p>
          <p><strong>Email:</strong> <span id="displayEmail">-</span></p>
          <p><strong>Phone:</strong> <span id="displayPhone">-</span></p>
        </div>

        <div class="info-panel">
          <h2>Rental Pages</h2>
          <p>Use these pages after logging in:</p>

          <div class="action-stack">
            <a class="link-btn" href="post-rental.html">Post a Rental Unit</a>
            <a class="link-btn" href="search-rentals.html">Search Rentals by Feature</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
